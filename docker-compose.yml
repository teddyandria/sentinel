# docker-compose pour le développement : Postgres + application Sentinel.
# Lancement : make docker-up  (ou : docker compose up --build)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Les fichiers .sql ici sont exécutés automatiquement à la 1ère initialisation.
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      # Contexte = racine du repo pour accéder à backend/ ET frontend/.
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy # on attend que Postgres soit prêt
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel}@db:5432/${POSTGRES_DB:-sentinel}?sslmode=disable"
      NEWS_API_KEY: ${NEWS_API_KEY}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      FETCH_INTERVAL: "30m"
      LOG_LEVEL: "info"
      # Ollama tourne sur l'HÔTE, pas dans le conteneur : on le joint via host.docker.internal.
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_ANSWER_MODEL: ${OLLAMA_ANSWER_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    ports:
      - "8080:8080"

volumes:
  pgdata:
